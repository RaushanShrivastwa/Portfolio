<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div id="display" class="display">0</div>
        <div class="buttons">
            <button class="btn operator" data-op="clear">C</button>
            <button class="btn operator" data-op="/">/</button>
            <button class="btn operator" data-op="*">*</button>
            <button class="btn operator" data-op="-">-</button>
            <button class="btn operator" data-op="7">7</button>
            <button class="btn operator" data-op="8">8</button>
            <button class="btn operator" data-op="9">9</button>
            <button class="btn operator" data-op="+">+</button>
            <button class="btn operator" data-op="4">4</button>
            <button class="btn operator" data-op="5">5</button>
            <button class="btn operator" data-op="6">6</button>
            <button class="btn operator" data-op="=">=</button>
            <button class="btn operator" data-op="1">1</button>
            <button class="btn operator" data-op="2">2</button>
            <button class="btn operator" data-op="3">3</button>
            <button class="btn operator" data-op="0">0</button>
            <button class="btn operator" data-op=".">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
